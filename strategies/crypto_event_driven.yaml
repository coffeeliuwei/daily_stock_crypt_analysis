instructions: |
  **事件驱动策略（Event-Driven Strategy）**

  核心思想：
  基于预测市场的"概率套利"——当市场价格与真实概率存在偏差时获利。
  关键是理解事件周期，在正确的时间窗口做出正确决策。

  ## 关键事件日历

  | 事件类型 | 影响等级 | 典型 Polymarket 市场 |
  |---------|---------|---------------------|
  | 美联储议息会议 | 高 | Fed rate decision |
  | BTC 减半 | 极高 | BTC halving impact |
  | ETF 审批 | 极高 | BTC/ETH ETF approval |
  | 以太坊升级 | 高 | ETH protocol upgrade |
  | 重大监管 | 高 | SEC/CFTC actions |
  | 交易所事件 | 中 | Exchange sanctions |

  ## 事件周期交易框架

  **阶段1：事件前 7-30 天（布局期）**
  - Polymarket 概率通常被低估（市场观望）
  - 策略：若判断概率 < 实际可能 → 提前布局
  - 仓位：正常仓位，设置止损

  **阶段2：事件前 1-7 天（波动期）**
  - 概率快速收敛，市场波动加剧
  - 策略：观察概率变化方向，顺势而为
  - 仓位：降至正常仓位的 50-80%

  **阶段3：事件当天（风险期）**
  - 高波动，不确定性最大
  - 策略：避免新开仓，管理现有持仓
  - 仓位：降至正常仓位的 20% 或清仓观望

  **阶段4：事件后（调整期）**
  - 概率锁定（结果已知）
  - 策略：根据实际结果调整仓位
  - 仓位：根据新趋势重新建仓

  ## 概率偏差检测

  **偏差判断方法：**
  1. Polymarket 概率 vs 历史类似事件概率
  2. Polymarket 概率 vs 分析师共识
  3. Polymarket 概率 vs 链上数据信号

  **偏差阈值：**
  - 偏差 > 15%：显著低估/高估，强烈信号
  - 偏差 10-15%：中度偏差，可考虑参与
  - 偏差 < 10%：市场有效，无明显机会

  **示例：**
  - Polymarket 显示 BTC ETF 批准概率 45%
  - 但分析师共识 65%，链上资金流入增加
  - 结论：市场低估，买入机会

  ## 仓位管理公式

  ```
  仓位比例 = 基础仓位 × 概率置信度 × 时间因子

  概率置信度：
  - 概率 > 70% 或 < 30%：高置信度（1.0）
  - 概率 50-70% 或 30-50%：中置信度（0.7）
  - 概率 45-55%：低置信度（0.3）

  时间因子：
  - 距事件 > 14 天：1.0
  - 距事件 7-14 天：0.8
  - 距事件 3-7 天：0.5
  - 距事件 < 3 天：0.2（大幅降仓）
  ```

  ## 决策规则

  1. **高置信度看涨事件**
     - 概率 > 70% 且偏差 > 15%
     - 操作：正常仓位买入
     - 止损：MA99 下方

  2. **中置信度看涨事件**
     - 概率 50-70% 或偏差 10-15%
     - 操作：半仓试探
     - 止损：事件概率逆转时

  3. **低置信度/分歧事件**
     - 概率 45-55% 或偏差 < 10%
     - 操作：观望，不参与

  4. **看跌事件**
     - 利空概率 > 60%
     - 操作：减仓或清仓

  ## 风险控制

  1. **事件不确定性**：即使概率 90%，仍有 10% 可能反向，必须设置止损
  2. **流动性风险**：只参考 Polymarket 流动性 > $100,000 的市场
  3. **信息滞后**：Polymarket 可能比主流媒体慢，需结合多源信息
  4. **黑天鹅事件**：不可预测的事件可能导致策略失效

  评分调整建议：
  - 高置信度看涨事件：`sentiment_score +20`
  - 中置信度看涨事件：`sentiment_score +10`
  - 事件概率与技术面共振：额外 `+10`
  - 事件临近（< 3天）且方向明确：根据方向 `±15`
  - 事件结果已确定：根据结果调整 `±25`
  - 概率偏差 > 15%（低估）：`+12`
  - 概率偏差 > 15%（高估）：`-12`