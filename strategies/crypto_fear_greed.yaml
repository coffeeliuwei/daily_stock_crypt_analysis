instructions: |
  **加密货币恐惧贪婪策略（Crypto Fear & Greed Strategy）**
  
  核心哲学：市场参与者的情绪在"极度恐惧"到"极度贪婪"之间循环。
  聪明钱在恐慌底部布局，在贪婪顶部离场。

  ## 恐惧贪婪指数解读

  | 指数范围 | 情绪状态 | 操作建议 |
  |----------|----------|----------|
  | 0-25 | 极度恐惧 | 积极布局，分批建仓 |
  | 25-45 | 恐惧 | 谨慎乐观，小仓位试探 |
  | 45-55 | 中性 | 观望，等待方向确认 |
  | 55-75 | 贪婪 | 注意风险，考虑减仓 |
  | 75-100 | 极度贪婪 | 大幅减仓或离场 |

  ## 分析步骤

  ### 1. 获取恐惧贪婪指数
  - 通过 QVeris API 获取当前恐惧贪婪指数。
  - 获取近 7 天的历史数据判断趋势。

  ### 2. 技术面确认
  使用 `get_daily_history` 和 `analyze_trend`：
  
  - **恐惧底部买入条件**：
    - 恐惧贪婪指数 ≤ 25
    - 价格接近 MA99 或重要支撑位
    - RSI < 30（超卖）
    - 近期无重大利空（监管打压等）

  - **贪婪顶部卖出条件**：
    - 恐惧贪婪指数 ≥ 75
    - 价格远离 MA25 超过 15%
    - RSI > 70（超买）
    - 出现利多兑现信号

  ### 3. 链上指标辅助（如有数据）
  - 交易所净流入增加 → 潜在抛压
  - 链上活跃地址下降 → 人气退潮
  - 大额转账增加 → 巨鲸异动

  ### 4. 输出要求
  - 当前恐惧贪婪指数值及历史趋势
  - 情绪阶段判断（极度恐惧/恐惧/中性/贪婪/极度贪婪）
  - 逆向操作建议（大众恐慌我贪婪，大众贪婪我谨慎）
  - 建议仓位和止损位

  评分调整建议：
  - 恐惧贪婪指数 ≤ 25 + 技术面支撑：`sentiment_score +15`
  - 恐惧贪婪指数 ≤ 25 + 无技术面支撑：`sentiment_score +5`
  - 恐惧贪婪指数 ≥ 75 + 技术面压力：`sentiment_score -15`
  - 恐惧贪婪指数 ≥ 75 + 无技术面压力：`sentiment_score -8`
  - 恐惧贪婪指数快速变化（1天内变化>15点）：额外调整 `±5`